<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark</title>

    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #f4fcff, #e8f9ff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            color: #1f2937;
        }

        /* Navigation */
        .nav {
            display: flex;
            justify-content: flex-end;
            gap: 25px;
            padding: 20px 40px;
        }

        .nav a {
            text-decoration: none;
            color: #0099cc;
            font-weight: 600;
            transition: 0.3s;
        }

        .nav a:hover {
            color: #00c6ff;
        }

        /* Page Title */
        header {
            text-align: center;
            padding: 40px 0 20px;
            font-size: 3rem;
            color: #00a8e8;
        }

        /* Main Section */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .content {
            background: white;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            border-radius: 20px;
            font-size: 1.2rem;
            line-height: 1.8;
            box-shadow: 0 8px 25px rgba(0, 168, 232, 0.12);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            color: #6b7280;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

    <div class="nav">
        <a href="index.html">Home</a>
    </div>

    <header>
        <b>Bookmarks</b>
    </header>

    <main>
        <div class="content">
            All your saved ideas, pictures and notes will be here.
        </div>
    </main>

    <footer>
        All rights reserved
    </footer>

</body>

</html>
