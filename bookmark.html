<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark</title>
    <style>
        /* Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #f4fcff, #e8f9ff);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    color: #1f2937;
}

/* Header */
header {
    padding: 40px 20px;
}

header a {
    text-decoration: none;
    color: #0099cc;
    font-weight: 600;
    font-size: 1rem;
    transition: 0.3s;
}

header a:hover {
    color: #00c6ff;
}

/* Main Section */
main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 30px;
}

main div {
    background: white;
    padding: 40px;
    max-width: 700px;
    width: 100%;
    text-align: center;
    border-radius: 20px;
    font-size: 1.2rem;
    line-height: 1.8;
    box-shadow: 0 8px 25px rgba(0, 168, 232, 0.12);
}

/* Footer */
footer {
    text-align: center;
    padding: 20px;
    background: rgba(255, 255, 255, 0.7);
    color: #6b7280;
    backdrop-filter: blur(10px);
}
    </style>
</head>

<body>
    <header>
        <a href="index.html">Home</a>
    </header>

    <main>
        <div>
            All your saved ideas, pictures and notes will be here.
        </div>
    </main>

    <footer>
        All rights reserved
    </footer>

</body>

</html>
